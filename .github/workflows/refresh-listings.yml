name: Refresh Property Listings

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh listings in index.html
        run: node scripts/refresh-listings.js
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "Bennyz Listings Bot"
          git config user.email "bot@bennyzrealty.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh property image URLs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
